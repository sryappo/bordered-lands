<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Historical Border Map</title>
  <link rel="stylesheet" href="css/style.css">
</head>
<body>
  <div id="app">
    <header id="header">
      <div id="year-display">2026</div>
      <div id="era-label"></div>
    </header>

    <div id="map-container">
      <div id="loading-overlay" class="hidden">
        <div class="spinner"></div>
        <span>Loading borders...</span>
      </div>
    </div>

    <footer id="controls">
      <div id="controls-inner">
        <button id="forward-btn" class="control-btn" title="Forward one year">
          <svg viewBox="0 0 24 24" width="20" height="20">
            <polygon points="8,5 19,12 8,19" fill="currentColor"/>
          </svg>
        </button>
        <button id="rewind-btn" class="control-btn primary" title="Rewind one year (Space)">
          <svg viewBox="0 0 24 24" width="28" height="28">
            <polygon points="16,5 5,12 16,19" fill="currentColor"/>
            <rect x="2" y="5" width="3" height="14" fill="currentColor"/>
          </svg>
        </button>
        <div id="speed-indicator" class="hidden">
          <span id="speed-text">1x</span>
        </div>
      </div>
      <div id="year-range">
        <span id="min-year-label">1800</span>
        <input type="range" id="year-slider" min="1800" max="2026" value="2026" step="1">
        <span id="max-year-label">2026</span>
      </div>
      <div id="legend">
        <span class="legend-item">
          <span class="legend-swatch border-swatch"></span> Country borders
        </span>
        <span class="legend-item">
          <span class="legend-swatch disputed-swatch"></span> Disputed zones
        </span>
      </div>
    </footer>
  </div>

  <!-- Libraries -->
  <script src="https://d3js.org/d3.v7.min.js"></script>
  <script src="https://unpkg.com/topojson-client@3"></script>

  <!-- App modules -->
  <script src="js/data.js"></script>
  <script src="js/map.js"></script>
  <script src="js/controls.js"></script>
  <script src="js/app.js"></script>
</body>
</html>
